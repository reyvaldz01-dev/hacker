<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS ADMIN | Ultimate Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Login Panel */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(15, 25, 35, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 48px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-bottom: 32px;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        /* Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding: 20px 28px;
            background: rgba(15, 25, 35, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-title span {
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-title p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(15, 25, 35, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 12px 32px rgba(0, 229, 255, 0.1);
        }

        .stat-icon {
            font-size: 32px;
            color: #00e5ff;
            margin-bottom: 12px;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 800;
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: rgba(15, 25, 35, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 28px;
            padding: 24px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        canvas {
            max-height: 250px;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding: 8px;
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid rgba(0, 229, 255, 0.1);
        }

        .tab-btn {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn i {
            font-size: 16px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            color: #03030a;
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.3);
        }

        /* Panels */
        .tab-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Forms */
        .form-card {
            background: rgba(15, 25, 35, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 229, 255, 0.15);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: #00e5ff;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select, .input-group textarea {
            padding: 14px 16px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00e5ff, #0099cc);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #03030a;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff3355, #cc0033);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            color: #03030a;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
        }

        /* Lists */
        .list-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .list-item:hover {
            border-color: rgba(0, 229, 255, 0.4);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-active { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .badge-expired { background: rgba(255, 51, 85, 0.2); color: #ff3355; border: 1px solid rgba(255,51,85,0.3); }
        .badge-banned { background: rgba(255, 51, 85, 0.2); color: #ff3355; }
        .badge-ip { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }

        .key-value {
            font-family: 'Monaco', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #00e5ff;
        }

        /* Alert */
        .alert {
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 16px;
            font-size: 13px;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid #ff3355;
            color: #ff3355;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border: 1px solid #00ff88;
            border-radius: 16px;
            padding: 16px 24px;
            z-index: 1100;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .data-table th {
            color: #00e5ff;
            font-weight: 600;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .tabs-container { flex-direction: column; border-radius: 28px; }
            .tab-btn { justify-content: center; }
            .dashboard-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <!-- Login Panel -->
        <div id="loginPanel" class="login-wrapper">
            <div class="login-card">
                <div class="logo">✦ NEXUS</div>
                <div class="logo-sub">ADMIN CONTROL PANEL v3.0</div>
                <div class="input-group" style="margin-bottom: 16px;">
                    <input type="text" id="adminUser" placeholder="Username" value="admin">
                </div>
                <div class="input-group" style="margin-bottom: 24px;">
                    <input type="password" id="adminPass" placeholder="Password">
                </div>
                <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="adminLogin()">
                    <i class="fas fa-arrow-right-to-bracket"></i> Access Dashboard
                </button>
                <div id="loginMsg"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <!-- Header -->
            <div class="dashboard-header">
                <div class="header-title">
                    <h1><span>✦ NEXUS</span> ADMIN PANEL</h1>
                    <p><i class="fas fa-shield-alt"></i> Ultimate Key Management System</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-outline" onclick="exportData()"><i class="fas fa-download"></i> Export</button>
                    <button class="btn btn-danger" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-pie"></i> Key Status Distribution</div>
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-line"></i> Recent Activity</div>
                    <canvas id="activityChart"></canvas>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i> Add Key</button>
                <button class="tab-btn" onclick="switchTab('bulk')"><i class="fas fa-layer-group"></i> Bulk Keys</button>
                <button class="tab-btn" onclick="switchTab('keys')"><i class="fas fa-list-ul"></i> Key List</button>
                <button class="tab-btn" onclick="switchTab('users')"><i class="fas fa-users"></i> Users</button>
                <button class="tab-btn" onclick="switchTab('ipban')"><i class="fas fa-ban"></i> IP Ban</button>
                <button class="tab-btn" onclick="switchTab('settings')"><i class="fas fa-cog"></i> Settings</button>
            </div>

            <!-- Tab: Add Key -->
            <div id="tabAdd" class="tab-panel active">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-crown"></i> Create Manual Key</div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-user"></i> User ID</label><input type="text" id="userId" placeholder="Enter User ID"></div>
                        <div class="input-group"><label><i class="fas fa-key"></i> Custom Key</label><input type="text" id="customKey" placeholder="Leave empty for auto"></div>
                        <div class="input-group"><label><i class="fas fa-lock"></i> Lock to IP</label><input type="text" id="lockIp" placeholder="Optional: specific IP"></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-calendar-day"></i> Days</label><input type="number" id="days" value="0" min="0"></div>
                        <div class="input-group"><label><i class="fas fa-clock"></i> Hours</label><input type="number" id="hours" value="3" min="0"></div>
                        <div class="input-group"><label><i class="fas fa-hourglass-half"></i> Minutes</label><input type="number" id="minutes" value="0" min="0"></div>
                    </div>
                    <button class="btn btn-success" onclick="addKey()"><i class="fas fa-magic"></i> Create Key</button>
                    <div id="addMsg"></div>
                </div>
            </div>

            <!-- Tab: Bulk Keys -->
            <div id="tabBulk" class="tab-panel">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-layer-group"></i> Bulk Key Generator</div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-user"></i> User ID</label><input type="text" id="bulkUserId" placeholder="Enter User ID"></div>
                        <div class="input-group"><label><i class="fas fa-hashtag"></i> Number of Keys</label><input type="number" id="bulkCount" value="5" min="1" max="100"></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-calendar-day"></i> Days</label><input type="number" id="bulkDays" value="0" min="0"></div>
                        <div class="input-group"><label><i class="fas fa-clock"></i> Hours</label><input type="number" id="bulkHours" value="3" min="0"></div>
                        <div class="input-group"><label><i class="fas fa-hourglass-half"></i> Minutes</label><input type="number" id="bulkMinutes" value="0" min="0"></div>
                    </div>
                    <button class="btn btn-success" onclick="bulkKeys()"><i class="fas fa-cogs"></i> Generate Bulk Keys</button>
                    <div id="bulkMsg"></div>
                    <div id="bulkResult" style="margin-top: 20px;"></div>
                </div>
            </div>

            <!-- Tab: Keys List -->
            <div id="tabKeys" class="tab-panel">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-key"></i> All Keys 
                        <button class="btn btn-sm btn-warning" onclick="deleteExpired()" style="margin-left:auto;"><i class="fas fa-clock"></i> Delete Expired</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAll()"><i class="fas fa-trash-alt"></i> Delete All</button>
                    </div>
                    <div class="list-container" id="keysList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Users -->
            <div id="tabUsers" class="tab-panel">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-users"></i> User Management
                        <button class="btn btn-sm btn-primary" onclick="loadUsers()" style="margin-left:auto;"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    <div class="list-container" id="usersList">Loading...</div>
                </div>
            </div>

            <!-- Tab: IP Ban -->
            <div id="tabIpban" class="tab-panel">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-ban"></i> IP Ban Management</div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-network-wired"></i> IP Address</label><input type="text" id="banIp" placeholder="192.168.1.1"></div>
                        <div class="input-group"><label><i class="fas fa-comment"></i> Reason</label><input type="text" id="banReason" placeholder="Spam / Abuse"></div>
                    </div>
                    <button class="btn btn-danger" onclick="banIp()"><i class="fas fa-gavel"></i> Ban IP</button>
                    <div style="margin-top: 24px;">
                        <div class="section-title"><i class="fas fa-list"></i> Banned IPs</div>
                        <div class="list-container" id="bannedIpsList">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Tab: Settings -->
            <div id="tabSettings" class="tab-panel">
                <div class="form-card">
                    <div class="section-title"><i class="fas fa-sliders-h"></i> System Configuration</div>
                    <div class="form-grid">
                        <div class="input-group"><label><i class="fas fa-lock"></i> IP Lock Enabled</label>
                            <select id="settingIpLock">
                                <option value="true">Yes (Key locked to IP)</option>
                                <option value="false">No (Any IP can use)</option>
                            </select>
                        </div>
                        <div class="input-group"><label><i class="fas fa-key"></i> Max Keys Per IP</label><input type="number" id="settingMaxKeys" value="5" min="1" max="100"></div>
                        <div class="input-group"><label><i class="fas fa-hourglass"></i> Cooldown (minutes)</label><input type="number" id="settingCooldown" value="1" min="0"></div>
                        <div class="input-group"><label><i class="fas fa-clock"></i> Default Duration (hours)</label><input type="number" id="settingDefaultDuration" value="3" min="1"></div>
                    </div>
                    <button class="btn btn-success" onclick="saveSettings()"><i class="fas fa-save"></i> Save Settings</button>
                    <div id="settingsMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let statusChart, activityChart;
        const BASE_API = "https://system-nexus-key.vercel.app";

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderColor = type === 'success' ? '#00ff88' : '#ff3355';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Login
        async function adminLogin() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            
            const res = await fetch(`${BASE_API}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                token = data.token;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats();
                loadKeys();
                loadUsers();
                loadSettings();
                loadBannedIps();
                initCharts();
                showToast('Login successful! Welcome to Nexus Admin', 'success');
            } else {
                document.getElementById('loginMsg').innerHTML = '<div class="alert alert-error">❌ Invalid credentials</div>';
            }
        }

        // Load Statistics
        async function loadStats() {
            const res = await fetch(`${BASE_API}/api/admin/stats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card" onclick="switchTab('keys')">
                        <div class="stat-icon"><i class="fas fa-key"></i></div>
                        <div class="stat-number">${data.stats.totalKeys}</div>
                        <div class="stat-label">Total Keys</div>
                    </div>
                    <div class="stat-card" onclick="switchTab('keys')">
                        <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                        <div class="stat-number">${data.stats.activeKeys}</div>
                        <div class="stat-label">Active Keys</div>
                    </div>
                    <div class="stat-card" onclick="switchTab('users')">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-number">${data.stats.totalUsers}</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-card" onclick="switchTab('users')">
                        <div class="stat-icon"><i class="fas fa-ban"></i></div>
                        <div class="stat-number">${data.stats.bannedUsers}</div>
                        <div class="stat-label">Banned Users</div>
                    </div>
                `;
                updateCharts(data.stats);
            }
        }

        // Charts
        function initCharts() {
            const ctx1 = document.getElementById('statusChart').getContext('2d');
            const ctx2 = document.getElementById('activityChart').getContext('2d');
            
            statusChart = new Chart(ctx1, {
                type: 'doughnut',
                data: { labels: ['Active', 'Expired'], datasets: [{ data: [0, 0], backgroundColor: ['#00ff88', '#ff3355'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } } } }
            });
            
            activityChart = new Chart(ctx2, {
                type: 'line',
                data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Keys Generated', data: [0,0,0,0,0,0,0], borderColor: '#00e5ff', backgroundColor: 'rgba(0,229,255,0.1)', tension: 0.4, fill: true }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
            });
        }

        function updateCharts(stats) {
            if (statusChart) {
                const active = stats.activeKeys || 0;
                const expired = (stats.totalKeys || 0) - active;
                statusChart.data.datasets[0].data = [active, expired];
                statusChart.update();
            }
        }

        // Load Keys
        async function loadKeys() {
            const res = await fetch(`${BASE_API}/api/admin/keys`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success && data.keys) {
                const container = document.getElementById('keysList');
                if (data.keys.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No keys found</div>';
                } else {
                    container.innerHTML = data.keys.map(k => `
                        <div class="list-item">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                                <div><span class="key-value"><i class="fas fa-key"></i> ${k.key_text}</span></div>
                                <div><span class="badge ${k.status === 'active' ? 'badge-active' : 'badge-expired'}">${k.status}</span></div>
                            </div>
                            <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; color: rgba(255,255,255,0.5);">
                                <span><i class="fas fa-user"></i> ${k.user_id}</span>
                                <span><i class="fas fa-hourglass"></i> ${k.duration_hours}h</span>
                                <span><i class="fas fa-calendar"></i> Expires: ${new Date(k.expiry_ms).toLocaleString()}</span>
                                ${k.locked_ip ? `<span><i class="fas fa-lock"></i> IP: ${k.locked_ip}</span>` : ''}
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteKey('${k.key_text}')" style="margin-top: 12px;"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    `).join('');
                }
            }
        }

        // Load Users
        async function loadUsers() {
            const res = await fetch(`${BASE_API}/api/admin/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success && data.users) {
                const container = document.getElementById('usersList');
                if (data.users.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No users found</div>';
                } else {
                    container.innerHTML = data.users.map(u => `
                        <div class="list-item">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                                <div><strong><i class="fas fa-user-circle"></i> ${u.user_id}</strong></div>
                                <div><span class="badge ${u.banned === 1 ? 'badge-banned' : 'badge-active'}">${u.banned === 1 ? 'BANNED' : 'ACTIVE'}</span></div>
                            </div>
                            <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; color: rgba(255,255,255,0.5);">
                                <span><i class="fas fa-envelope"></i> ${u.email || 'N/A'}</span>
                                <span><i class="fas fa-phone"></i> ${u.phone || 'N/A'}</span>
                                <span><i class="fas fa-key"></i> Keys: ${u.keys_generated || 0}</span>
                                ${u.ip_address ? `<span><i class="fas fa-network-wired"></i> IP: ${u.ip_address}</span>` : ''}
                            </div>
                            <div style="margin-top: 12px;">
                                ${u.banned === 1 ? 
                                    `<button class="btn btn-sm btn-success" onclick="unbanUser('${u.user_id}')"><i class="fas fa-check"></i> Unban</button>` :
                                    `<button class="btn btn-sm btn-danger" onclick="banUser('${u.user_id}')"><i class="fas fa-ban"></i> Ban</button>`
                                }
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        // Load Banned IPs
        async function loadBannedIps() {
            const res = await fetch(`${BASE_API}/api/admin/banned-ips`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success && data.ips) {
                const container = document.getElementById('bannedIpsList');
                if (data.ips.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No banned IPs</div>';
                } else {
                    container.innerHTML = data.ips.map(ip => `
                        <div class="list-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div><i class="fas fa-network-wired"></i> <strong>${ip.ip_address}</strong></div>
                                <button class="btn btn-sm btn-success" onclick="unbanIp('${ip.ip_address}')"><i class="fas fa-check"></i> Unban</button>
                            </div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 8px;">
                                Reason: ${ip.reason || 'No reason'}<br>
                                Banned at: ${new Date(ip.banned_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        // Load Settings
        async function loadSettings() {
            const res = await fetch(`${BASE_API}/api/admin/get-settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('settingIpLock').value = data.settings.ip_lock_enabled || 'true';
                document.getElementById('settingMaxKeys').value = data.settings.max_keys_per_ip || '5';
                document.getElementById('settingCooldown').value = data.settings.cooldown_minutes || '1';
                document.getElementById('settingDefaultDuration').value = data.settings.default_duration_hours || '3';
            }
        }

        // Save Settings
        async function saveSettings() {
            const settings = {
                ip_lock_enabled: document.getElementById('settingIpLock').value,
                max_keys_per_ip: document.getElementById('settingMaxKeys').value,
                cooldown_minutes: document.getElementById('settingCooldown').value,
                default_duration_hours: document.getElementById('settingDefaultDuration').value
            };
            
            const res = await fetch(`${BASE_API}/api/admin/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, ...settings })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Settings saved successfully!', 'success');
            } else {
                showToast('Failed to save settings', 'error');
            }
        }

        // CRUD Operations
        async function addKey() {
            const userId = document.getElementById('userId').value;
            const days = parseInt(document.getElementById('days').value) || 0;
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const keyText = document.getElementById('customKey').value;
            const lockToIp = document.getElementById('lockIp').value || null;
            
            if (!userId) { showToast('User ID required', 'error'); return; }
            
            const res = await fetch(`${BASE_API}/api/admin/add-key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, userId, days, hours, minutes, keyText, lockToIp })
            });
            const data = await res.json();
            if (data.success) {
                showToast(`Key created: ${data.key}`, 'success');
                document.getElementById('addMsg').innerHTML = `<div class="alert alert-success">✅ Key: ${data.key}<br>Expires: ${data.expiryFormatted}<br>Locked IP: ${data.lockedIp || 'none'}</div>`;
                loadStats(); loadKeys();
            } else { showToast(data.error, 'error'); }
        }

        async function bulkKeys() {
            const userId = document.getElementById('bulkUserId').value;
            const count = parseInt(document.getElementById('bulkCount').value);
            const days = parseInt(document.getElementById('bulkDays').value) || 0;
            const hours = parseInt(document.getElementById('bulkHours').value) || 0;
            const minutes = parseInt(document.getElementById('bulkMinutes').value) || 0;
            
            if (!userId) { showToast('User ID required', 'error'); return; }
            if (count > 100) { showToast('Max 100 keys at once', 'error'); return; }
            
            const res = await fetch(`${BASE_API}/api/admin/add-bulk-keys`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, userId, count, days, hours, minutes })
            });
            const data = await res.json();
            if (data.success) {
                showToast(`Generated ${data.count} keys`, 'success');
                document.getElementById('bulkMsg').innerHTML = `<div class="alert alert-success">✅ Generated ${data.count} keys for ${userId}</div>`;
                document.getElementById('bulkResult').innerHTML = data.keys.map(k => `<div class="key-value"><i class="fas fa-key"></i> ${k}</div>`).join('');
                loadStats(); loadKeys();
            } else { showToast(data.error, 'error'); }
        }

        async function deleteKey(key) { if(confirm(`Delete ${key}?`)){ await fetch(`${BASE_API}/api/admin/delete-key`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, key}) }); loadKeys(); loadStats(); showToast('Key deleted', 'success'); } }
        async function deleteExpired() { if(confirm('Delete all expired keys?')){ await fetch(`${BASE_API}/api/admin/delete-expired-keys`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) }); loadKeys(); loadStats(); showToast('Expired keys deleted', 'success'); } }
        async function deleteAll() { if(confirm('⚠️ DELETE ALL KEYS? This cannot be undone!')){ await fetch(`${BASE_API}/api/admin/delete-all-keys`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) }); loadKeys(); loadStats(); showToast('All keys deleted', 'success'); } }
        
        async function banUser(userId) { if(confirm(`Ban user ${userId}?`)){ await fetch(`${BASE_API}/api/admin/ban-user`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, userId}) }); loadUsers(); loadStats(); showToast(`User ${userId} banned`, 'success'); } }
        async function unbanUser(userId) { await fetch(`${BASE_API}/api/admin/unban-user`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, userId}) }); loadUsers(); loadStats(); showToast(`User ${userId} unbanned`, 'success'); }
        
        async function banIp() { const ip = document.getElementById('banIp').value; const reason = document.getElementById('banReason').value; if(!ip){ showToast('IP required', 'error'); return; } const res = await fetch(`${BASE_API}/api/admin/ban-ip`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, ip, reason}) }); const data = await res.json(); if(data.success){ showToast(`IP ${ip} banned`, 'success'); loadBannedIps(); } else { showToast(data.error, 'error'); } }
        async function unbanIp(ip) { await fetch(`${BASE_API}/api/admin/unban-ip`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, ip}) }); loadBannedIps(); showToast(`IP ${ip} unbanned`, 'success'); }
        
        function exportData() { alert('Export feature: Data can be exported from Supabase dashboard'); }
        
        async function adminLogout() { await fetch(`${BASE_API}/api/admin/logout`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) }); token = null; document.getElementById('loginPanel').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none'; showToast('Logged out', 'info'); }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tabs = ['add', 'bulk', 'keys', 'users', 'ipban', 'settings'];
            const index = tabs.indexOf(tab);
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            if (tab === 'keys') loadKeys();
            if (tab === 'users') loadUsers();
            if (tab === 'ipban') loadBannedIps();
        }
    </script>
</body>
</html>
