<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Admin Panel - Full Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #03030a);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 48px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 32px;
        }

        .dashboard {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 28px;
            background: rgba(10, 10, 20, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 800;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding: 8px;
            background: rgba(10, 10, 20, 0.4);
            border-radius: 60px;
        }

        .tab-btn {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            color: #03030a;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .form-card {
            background: rgba(10, 10, 20, 0.5);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e5ff;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00e5ff, #0099cc);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff3355, #cc0033);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #03030a;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            color: #03030a;
        }

        .list-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 16px;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid #ff3355;
            color: #ff3355;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .badge-expired {
            background: rgba(255, 51, 85, 0.2);
            color: #ff3355;
        }

        .key-value {
            font-family: monospace;
            font-size: 14px;
            font-weight: 700;
            color: #00e5ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Panel -->
        <div id="loginPanel" class="login-wrapper">
            <div class="login-card">
                <div class="logo">✦ NEXUS ADMIN</div>
                <input type="text" id="adminUser" placeholder="Username" value="admin" style="width:100%; padding:14px; margin-bottom:12px; border-radius:30px;">
                <input type="password" id="adminPass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:30px;">
                <button onclick="adminLogin()" class="btn-primary" style="width:100%;">Login</button>
                <div id="loginMsg"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="header">
                <h1><i class="fas fa-crown"></i> NEXUS ADMIN PANEL</h1>
                <button onclick="adminLogout()" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-number" id="totalKeys">0</div><div class="stat-label">Total Keys</div></div>
                <div class="stat-card"><div class="stat-number" id="activeKeys">0</div><div class="stat-label">Active Keys</div></div>
                <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
                <div class="stat-card"><div class="stat-number" id="bannedUsers">0</div><div class="stat-label">Banned Users</div></div>
                <div class="stat-card"><div class="stat-number" id="challengesCompleted">0</div><div class="stat-label">Challenges</div></div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i> Add Key</button>
                <button class="tab-btn" onclick="switchTab('bulk')"><i class="fas fa-layer-group"></i> Bulk Keys</button>
                <button class="tab-btn" onclick="switchTab('keys')"><i class="fas fa-key"></i> Keys List</button>
                <button class="tab-btn" onclick="switchTab('users')"><i class="fas fa-users"></i> Users</button>
                <button class="tab-btn" onclick="switchTab('manage')"><i class="fas fa-tools"></i> Manage</button>
            </div>

            <!-- Tab: Add Key (LENGKAP) -->
            <div id="tabAdd" class="tab-panel active">
                <div class="form-card">
                    <h3><i class="fas fa-plus-circle"></i> Create Manual Key</h3>
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="manualUserId" placeholder="Enter User ID (Telegram ID / Username)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar-day"></i> Days</label>
                            <input type="number" id="manualDays" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Hours</label>
                            <input type="number" id="manualHours" value="3" min="0">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-hourglass-half"></i> Minutes</label>
                            <input type="number" id="manualMinutes" value="0" min="0" step="5">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Custom Key (Optional)</label>
                        <input type="text" id="manualKeyText" placeholder="Leave empty for auto-generate">
                    </div>
                    <button onclick="adminAddKey()" class="btn-success"><i class="fas fa-magic"></i> Create Key</button>
                    <div id="addKeyMsg"></div>
                </div>
            </div>

            <!-- Tab: Bulk Keys -->
            <div id="tabBulk" class="tab-panel">
                <div class="form-card">
                    <h3><i class="fas fa-layer-group"></i> Bulk Key Generator</h3>
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="bulkUserId" placeholder="Enter User ID">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Number of Keys</label>
                            <input type="number" id="bulkCount" value="5" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>Days</label>
                            <input type="number" id="bulkDays" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Hours</label>
                            <input type="number" id="bulkHours" value="3" min="0">
                        </div>
                        <div class="form-group">
                            <label>Minutes</label>
                            <input type="number" id="bulkMinutes" value="0" min="0" step="5">
                        </div>
                    </div>
                    <button onclick="adminBulkKeys()" class="btn-primary"><i class="fas fa-cogs"></i> Generate Bulk Keys</button>
                    <div id="bulkMsg"></div>
                    <div id="bulkResult" style="margin-top: 20px;"></div>
                </div>
            </div>

            <!-- Tab: Keys List -->
            <div id="tabKeys" class="tab-panel">
                <div class="form-card">
                    <h3><i class="fas fa-key"></i> All Keys</h3>
                    <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                        <button onclick="loadKeys()" class="btn-primary"><i class="fas fa-sync-alt"></i> Refresh</button>
                        <button onclick="deleteExpiredKeys()" class="btn-warning"><i class="fas fa-clock"></i> Delete Expired</button>
                        <button onclick="deleteAllKeys()" class="btn-danger"><i class="fas fa-trash-alt"></i> Delete All</button>
                    </div>
                    <div class="list-container" id="keysList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Users -->
            <div id="tabUsers" class="tab-panel">
                <div class="form-card">
                    <h3><i class="fas fa-users"></i> All Users</h3>
                    <button onclick="loadUsers()" class="btn-primary" style="margin-bottom: 20px;"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <div class="list-container" id="usersList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Manage -->
            <div id="tabManage" class="tab-panel">
                <div class="form-card">
                    <h3><i class="fas fa-tools"></i> Database Management</h3>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button onclick="exportData()" class="btn-success"><i class="fas fa-download"></i> Export All Data</button>
                        <button onclick="clearAllData()" class="btn-danger"><i class="fas fa-radiation"></i> Clear All Data</button>
                    </div>
                    <div id="manageMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ADMIN_TOKEN = null;
        const API_BASE = "https://system-nexus-key.vercel.app;

        async function adminLogin() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            
            const res = await fetch(`${API_BASE}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                ADMIN_TOKEN = data.token;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats();
                loadKeys();
                loadUsers();
            } else {
                document.getElementById('loginMsg').innerHTML = `<div class="alert alert-error">Login failed</div>`;
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: ADMIN_TOKEN })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('totalKeys').innerText = data.stats.totalKeys;
                    document.getElementById('activeKeys').innerText = data.stats.activeKeys;
                    document.getElementById('totalUsers').innerText = data.stats.totalUsers;
                    document.getElementById('bannedUsers').innerText = data.stats.bannedUsers;
                    document.getElementById('challengesCompleted').innerText = data.stats.challengesCompleted;
                }
            } catch(e) {
                console.error('Stats error:', e);
            }
        }

        async function loadKeys() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: ADMIN_TOKEN })
                });
                const data = await res.json();
                
                if (data.success && data.keys) {
                    const container = document.getElementById('keysList');
                    if (data.keys.length === 0) {
                        container.innerHTML = '<div class="alert">No keys found</div>';
                    } else {
                        container.innerHTML = data.keys.map(k => `
                            <div class="list-item">
                                <div><span class="key-value">🔑 ${k.key_text}</span> <span class="badge ${k.status === 'active' ? 'badge-active' : 'badge-expired'}">${k.status}</span></div>
                                <div>👤 User: ${k.user_id}</div>
                                <div>⏰ Duration: ${k.duration_hours} hours (${k.duration_days}d ${k.duration_minutes}m)</div>
                                <div>📅 Expires: ${new Date(k.expiry_ms).toLocaleString()}</div>
                                <div>📆 Created: ${new Date(k.created_at).toLocaleString()}</div>
                                <button onclick="deleteKey('${k.key_text}')" class="btn-danger" style="margin-top: 8px;"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) {
                console.error('Load keys error:', e);
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: ADMIN_TOKEN })
                });
                const data = await res.json();
                
                if (data.success && data.users) {
                    const container = document.getElementById('usersList');
                    if (data.users.length === 0) {
                        container.innerHTML = '<div class="alert">No users found</div>';
                    } else {
                        container.innerHTML = data.users.map(u => `
                            <div class="list-item">
                                <div><strong>👤 ${u.user_id}</strong> <span class="badge ${u.banned === 1 ? 'badge-expired' : 'badge-active'}">${u.banned === 1 ? 'BANNED' : 'ACTIVE'}</span></div>
                                <div>📧 Email: ${u.email || 'N/A'} | 📱 Phone: ${u.phone || 'N/A'}</div>
                                <div>🔑 Keys Generated: ${u.keys_generated || 0}</div>
                                <div>📅 Registered: ${new Date(u.created_at).toLocaleString()}</div>
                                <div style="margin-top: 8px;">
                                    ${u.banned === 1 ? 
                                        `<button onclick="unbanUser('${u.user_id}')" class="btn-success"><i class="fas fa-check"></i> Unban</button>` :
                                        `<button onclick="banUser('${u.user_id}')" class="btn-danger"><i class="fas fa-ban"></i> Ban</button>`
                                    }
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) {
                console.error('Load users error:', e);
            }
        }

        async function adminAddKey() {
            const userId = document.getElementById('manualUserId').value.trim();
            const days = parseInt(document.getElementById('manualDays').value) || 0;
            const hours = parseInt(document.getElementById('manualHours').value) || 0;
            const minutes = parseInt(document.getElementById('manualMinutes').value) || 0;
            const keyText = document.getElementById('manualKeyText').value.trim();
            
            if (!userId) {
                document.getElementById('addKeyMsg').innerHTML = '<div class="alert alert-error">User ID required</div>';
                return;
            }
            
            if (days === 0 && hours === 0 && minutes === 0) {
                document.getElementById('addKeyMsg').innerHTML = '<div class="alert alert-error">Duration must be greater than 0</div>';
                return;
            }
            
            const totalHours = days * 24 + hours + minutes / 60;
            
            document.getElementById('addKeyMsg').innerHTML = '<div class="alert">Creating key...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/add-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: ADMIN_TOKEN, 
                        userId, 
                        days, 
                        hours, 
                        minutes,
                        keyText: keyText || undefined
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('addKeyMsg').innerHTML = `<div class="alert alert-success">
                        ✅ Key created: <strong>${data.key}</strong><br>
                        📅 Expires: ${data.expiryFormatted}<br>
                        ⏰ Duration: ${data.duration.days}d ${data.duration.hours}h ${data.duration.minutes}m
                    </div>`;
                    loadStats();
                    loadKeys();
                } else {
                    document.getElementById('addKeyMsg').innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
                }
            } catch(e) {
                document.getElementById('addKeyMsg').innerHTML = `<div class="alert alert-error">❌ Network error: ${e.message}</div>`;
            }
        }

        async function adminBulkKeys() {
            const userId = document.getElementById('bulkUserId').value.trim();
            const count = parseInt(document.getElementById('bulkCount').value) || 1;
            const days = parseInt(document.getElementById('bulkDays').value) || 0;
            const hours = parseInt(document.getElementById('bulkHours').value) || 0;
            const minutes = parseInt(document.getElementById('bulkMinutes').value) || 0;
            
            if (!userId) {
                document.getElementById('bulkMsg').innerHTML = '<div class="alert alert-error">User ID required</div>';
                return;
            }
            
            if (count > 100) {
                document.getElementById('bulkMsg').innerHTML = '<div class="alert alert-error">Max 100 keys at once</div>';
                return;
            }
            
            document.getElementById('bulkMsg').innerHTML = '<div class="alert">Generating keys...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/add-bulk-keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: ADMIN_TOKEN, 
                        userId, 
                        count,
                        days, 
                        hours, 
                        minutes
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('bulkMsg').innerHTML = `<div class="alert alert-success">✅ Generated ${data.count} keys for user ${userId}</div>`;
                    document.getElementById('bulkResult').innerHTML = `
                        <div class="form-card">
                            <h4>Generated Keys:</h4>
                            ${data.keys.map(k => `<div class="key-value" style="margin: 5px 0;">🔑 ${k}</div>`).join('')}
                            <div style="margin-top: 12px;">📅 All expire at: ${data.expiryFormatted}</div>
                        </div>
                    `;
                    loadStats();
                    loadKeys();
                } else {
                    document.getElementById('bulkMsg').innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
                }
            } catch(e) {
                document.getElementById('bulkMsg').innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
            }
        }

        async function deleteKey(key) {
            if (!confirm(`Delete key ${key}?`)) return;
            await fetch(`${API_BASE}/api/admin/delete-key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN, key })
            });
            loadStats();
            loadKeys();
        }

        async function deleteAllKeys() {
            if (!confirm('⚠️ DELETE ALL KEYS? This cannot be undone!')) return;
            await fetch(`${API_BASE}/api/admin/delete-all-keys`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN })
            });
            loadStats();
            loadKeys();
        }

        async function deleteExpiredKeys() {
            if (!confirm('Delete all expired keys?')) return;
            const res = await fetch(`${API_BASE}/api/admin/delete-expired-keys`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN })
            });
            const data = await res.json();
            alert(`Deleted ${data.deletedCount} expired keys`);
            loadStats();
            loadKeys();
        }

        async function banUser(userId) {
            if (!confirm(`Ban user ${userId}?`)) return;
            await fetch(`${API_BASE}/api/admin/ban-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN, userId })
            });
            loadStats();
            loadUsers();
        }

        async function unbanUser(userId) {
            await fetch(`${API_BASE}/api/admin/unban-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN, userId })
            });
            loadStats();
            loadUsers();
        }

        function exportData() {
            alert('Export feature: Data can be exported from Supabase dashboard');
        }

        function clearAllData() {
            if (confirm('⚠️ DANGER! This will delete ALL data. Continue?')) {
                alert('Use Supabase dashboard to clear data');
            }
        }

        async function adminLogout() {
            await fetch(`${API_BASE}/api/admin/logout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN })
            });
            ADMIN_TOKEN = null;
            document.getElementById('loginPanel').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const tabs = ['add', 'bulk', 'keys', 'users', 'manage'];
            const index = tabs.indexOf(tab);
            
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            
            if (tab === 'keys') loadKeys();
            if (tab === 'users') loadUsers();
        }
    </script>
</body>
</html>
