<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Free Key Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #03030a);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
        }

        /* Cards */
        .card {
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title i {
            color: #00e5ff;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e5ff;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00e5ff, #0099cc);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #03030a;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffaa33, #ff8800);
        }

        /* Steps */
        .steps-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: rgba(20, 20, 35, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            position: relative;
        }

        .step.completed {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .step.active {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .step-number {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .step-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        .step.completed .step-number { color: #00ff88; }
        .step.active .step-number { color: #00e5ff; }

        /* Result */
        .key-result {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .key-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 16px;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid #ff3355;
            color: #ff3355;
        }

        .alert-info {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
        }

        /* Duration selector */
        .duration-selector {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .duration-option {
            flex: 1;
            padding: 16px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .duration-option.selected {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .duration-hours {
            font-size: 24px;
            font-weight: 700;
        }

        .duration-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .card { padding: 20px; }
            .steps-container { flex-direction: column; }
            .duration-selector { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✦ Nexus</div>
            <div class="subtitle">Free Key Generator - Complete 5 Steps to Claim</div>
        </div>

        <!-- User Info Card -->
        <div class="card" id="userCard">
            <div class="card-title"><i>👤</i> User Information</div>
            <div class="form-group">
                <label>User ID (Telegram ID / Username)</label>
                <input type="text" id="userId" placeholder="e.g., @username or 123456789">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="081234567890">
            </div>
            <button onclick="startChallenge()" id="startBtn">🚀 Start Challenge</button>
            <div id="userInfoMessage"></div>
        </div>

        <!-- Challenge Status Card -->
        <div class="card" id="challengeCard" style="display: none;">
            <div class="card-title"><i>📋</i> 5-Step Challenge</div>
            
            <div class="steps-container" id="stepsContainer">
                <div class="step" id="step1"><div class="step-number">1</div><div class="step-label">Email Verify</div></div>
                <div class="step" id="step2"><div class="step-number">2</div><div class="step-label">Subscribe</div></div>
                <div class="step" id="step3"><div class="step-number">3</div><div class="step-label">Captcha</div></div>
                <div class="step" id="step4"><div class="step-number">4</div><div class="step-label">Share</div></div>
                <div class="step" id="step5"><div class="step-number">5</div><div class="step-label">Watch Ad</div></div>
            </div>

            <div id="stepContent"></div>
            <div id="challengeMessage"></div>
        </div>

        <!-- My Key Card -->
        <div class="card" id="myKeyCard">
            <div class="card-title"><i>🔑</i> My Active Key</div>
            <div id="myKeyContent">Loading...</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://system-nexus-key.vercel.app";
        let currentUserId = null;
        let currentStep = 1;
        let selectedDuration = 3;

        // Load user's active key on page load
        async function loadMyKey() {
            const userId = localStorage.getItem('nexus_user_id');
            if (!userId) {
                document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info">🔐 Login to see your active key</div>';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/my-key/${userId}`);
                const data = await res.json();
                
                if (data.hasKey) {
                    document.getElementById('myKeyContent').innerHTML = `
                        <div class="key-result">
                            <div style="margin-bottom: 12px;">🎉 Your Active Key</div>
                            <div class="key-value">${data.key}</div>
                            <div style="margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.5);">
                                ⏰ Expires in: ${data.remaining}<br>
                                📅 Duration: ${data.duration} hours
                            </div>
                            <button class="btn-success" style="margin-top: 16px;" onclick="copyKey('${data.key}')">📋 Copy Key</button>
                        </div>
                    `;
                } else {
                    document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info">🔑 No active key. Complete the challenge to get one!</div>';
                }
            } catch (err) {
                document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-error">Error loading key</div>';
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert('✅ Key copied: ' + key);
        }

        // Start challenge
        async function startChallenge() {
            const userId = document.getElementById('userId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!userId || !email || !phone) {
                showMessage('userInfoMessage', 'Please fill all fields', 'error');
                return;
            }
            
            if (!email.includes('@')) {
                showMessage('userInfoMessage', 'Invalid email address', 'error');
                return;
            }
            
            currentUserId = userId;
            localStorage.setItem('nexus_user_id', userId);
            
            showMessage('userInfoMessage', 'Starting challenge...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, email, phone })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('userCard').style.display = 'none';
                    document.getElementById('challengeCard').style.display = 'block';
                    currentStep = 1;
                    showStep1();
                } else {
                    showMessage('userInfoMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('userInfoMessage', 'Network error: ' + err.message, 'error');
            }
        }

        function updateStepsDisplay() {
            for (let i = 1; i <= 5; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (i < currentStep) {
                    stepEl.classList.add('completed');
                    stepEl.classList.remove('active');
                } else if (i === currentStep) {
                    stepEl.classList.add('active');
                    stepEl.classList.remove('completed');
                } else {
                    stepEl.classList.remove('completed', 'active');
                }
            }
        }

        // STEP 1: Email Verification
        async function showStep1() {
            updateStepsDisplay();
            const stepContent = document.getElementById('stepContent');
            stepContent.innerHTML = `
                <div class="form-group">
                    <label>📧 Email Verification</label>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px;">
                        We've sent a verification code to your email.
                    </p>
                    <input type="text" id="verifyCode" placeholder="Enter 6-digit code" maxlength="6">
                    <button onclick="sendVerificationCode()" style="margin-top: 10px; background: #555;">📨 Resend Code</button>
                    <button onclick="verifyStep1()" style="margin-top: 10px;" class="btn-success">✓ Verify Email</button>
                </div>
            `;
            
            // Auto send code
            await sendVerificationCode();
        }

        async function sendVerificationCode() {
            const email = document.getElementById('email').value;
            const userId = currentUserId;
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, email })
                });
                const data = await res.json();
                showMessage('challengeMessage', data.message, 'info');
                if (data.code) {
                    document.getElementById('verifyCode').value = data.code;
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error sending code', 'error');
            }
        }

        async function verifyStep1() {
            const code = document.getElementById('verifyCode').value;
            const userId = currentUserId;
            
            if (!code || code.length !== 6) {
                showMessage('challengeMessage', 'Enter 6-digit code', 'error');
                return;
            }
            
            showMessage('challengeMessage', 'Verifying...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, code })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 2;
                    showStep2();
                } else {
                    showMessage('challengeMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error: ' + err.message, 'error');
            }
        }

        // STEP 2: Telegram Subscription
        function showStep2() {
            updateStepsDisplay();
            const stepContent = document.getElementById('stepContent');
            stepContent.innerHTML = `
                <div class="form-group">
                    <label>📱 Subscribe to Telegram Channel</label>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px;">
                        Join our Telegram channel to continue.
                    </p>
                    <a href="https://t.me/nexus_channel" target="_blank" style="display: block; text-align: center; padding: 12px; background: #0088cc; border-radius: 20px; color: white; text-decoration: none; margin-bottom: 16px;">
                        📲 Join @NexusChannel
                    </a>
                    <input type="text" id="telegramUsername" placeholder="Your Telegram username (e.g., @username)">
                    <button onclick="verifyStep2()" class="btn-success" style="margin-top: 16px;">✓ Verify Subscription</button>
                </div>
            `;
        }

        async function verifyStep2() {
            const telegramUsername = document.getElementById('telegramUsername').value;
            const userId = currentUserId;
            
            if (!telegramUsername) {
                showMessage('challengeMessage', 'Enter your Telegram username', 'error');
                return;
            }
            
            showMessage('challengeMessage', 'Verifying...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, telegramUsername })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 3;
                    showStep3();
                } else {
                    showMessage('challengeMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error: ' + err.message, 'error');
            }
        }

        // STEP 3: Captcha
        function showStep3() {
            updateStepsDisplay();
            const stepContent = document.getElementById('stepContent');
            const num1 = Math.floor(Math.random() * 20) + 5;
            const num2 = Math.floor(Math.random() * 10) + 2;
            const answer = num1 + num2;
            
            stepContent.innerHTML = `
                <div class="form-group">
                    <label>🔒 Complete Captcha</label>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px;">
                        Prove you're human.
                    </p>
                    <div style="background: rgba(0,0,0,0.3); padding: 20px; text-align: center; border-radius: 16px; margin-bottom: 16px;">
                        <span style="font-size: 32px; font-weight: 700;">${num1} + ${num2} = ?</span>
                    </div>
                    <input type="number" id="captchaAnswer" placeholder="Enter answer">
                    <button onclick="verifyStep3(${answer})" class="btn-success" style="margin-top: 16px;">✓ Verify Captcha</button>
                </div>
            `;
        }

        async function verifyStep3(expectedAnswer) {
            const userAnswer = parseInt(document.getElementById('captchaAnswer').value);
            const userId = currentUserId;
            
            if (userAnswer !== expectedAnswer) {
                showMessage('challengeMessage', 'Wrong answer! Try again.', 'error');
                return;
            }
            
            showMessage('challengeMessage', 'Verifying...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/step3`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, captchaAnswer: userAnswer })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 4;
                    showStep4();
                } else {
                    showMessage('challengeMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error: ' + err.message, 'error');
            }
        }

        // STEP 4: Share
        function showStep4() {
            updateStepsDisplay();
            const shareLink = `${window.location.origin}/?ref=${currentUserId}`;
            
            const stepContent = document.getElementById('stepContent');
            stepContent.innerHTML = `
                <div class="form-group">
                    <label>📢 Share to 3 Friends</label>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px;">
                        Share this link with 3 friends. After they sign up, you'll get your key!
                    </p>
                    <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; word-break: break-all; margin-bottom: 16px;">
                        🔗 ${shareLink}
                    </div>
                    <button onclick="copyShareLink('${shareLink}')" style="margin-bottom: 16px;">📋 Copy Link</button>
                    <input type="text" id="shareProof" placeholder="Share proof (screenshot link or friend's username)">
                    <button onclick="verifyStep4()" class="btn-success" style="margin-top: 16px;">✓ Verify Shares</button>
                </div>
            `;
        }

        function copyShareLink(link) {
            navigator.clipboard.writeText(link);
            alert('Link copied! Share with 3 friends.');
        }

        async function verifyStep4() {
            const shareProof = document.getElementById('shareProof').value;
            const userId = currentUserId;
            
            if (!shareProof) {
                showMessage('challengeMessage', 'Enter share proof', 'error');
                return;
            }
            
            showMessage('challengeMessage', 'Verifying...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/step4`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, shareProof })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 5;
                    showStep5();
                } else {
                    showMessage('challengeMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error: ' + err.message, 'error');
            }
        }

        // STEP 5: Watch Ad & Claim
        function showStep5() {
            updateStepsDisplay();
            
            const stepContent = document.getElementById('stepContent');
            stepContent.innerHTML = `
                <div class="form-group">
                    <label>🎬 Watch 30-Second Ad</label>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px;">
                        Watch this short ad to unlock your free key.
                    </p>
                    
                    <div style="background: rgba(0,0,0,0.5); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px;">
                        <div style="font-size: 48px; margin-bottom: 12px;">📺</div>
                        <div style="font-weight: 600;">Advertisement</div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.5);">30 seconds</div>
                        <div id="adTimer" style="font-size: 24px; font-weight: 700; margin: 12px 0;">30s</div>
                        <button id="watchAdBtn" onclick="startAdTimer()">▶ Watch Ad</button>
                    </div>
                    
                    <div class="duration-selector" id="durationSelector">
                        <div class="duration-option" data-hours="3" onclick="selectDuration(3)">
                            <div class="duration-hours">3</div>
                            <div class="duration-label">Hours</div>
                        </div>
                        <div class="duration-option" data-hours="6" onclick="selectDuration(6)">
                            <div class="duration-hours">6</div>
                            <div class="duration-label">Hours</div>
                        </div>
                        <div class="duration-option selected" data-hours="12" onclick="selectDuration(12)">
                            <div class="duration-hours">12</div>
                            <div class="duration-label">Hours</div>
                        </div>
                    </div>
                    
                    <button id="claimBtn" onclick="claimReward()" disabled style="width: 100%; margin-top: 16px;" class="btn-success">🎁 Claim Your Key (Watch Ad First)</button>
                </div>
            `;
            
            selectedDuration = 12;
        }

        function selectDuration(hours) {
            selectedDuration = hours;
            document.querySelectorAll('.duration-option').forEach(opt => {
                opt.classList.remove('selected');
                if (parseInt(opt.dataset.hours) === hours) {
                    opt.classList.add('selected');
                }
            });
        }

        let adTimerInterval = null;

        function startAdTimer() {
            const watchBtn = document.getElementById('watchAdBtn');
            const claimBtn = document.getElementById('claimBtn');
            const timerDiv = document.getElementById('adTimer');
            
            watchBtn.disabled = true;
            let timeLeft = 30;
            timerDiv.textContent = `${timeLeft}s`;
            
            adTimerInterval = setInterval(() => {
                timeLeft--;
                timerDiv.textContent = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(adTimerInterval);
                    timerDiv.textContent = '✓ Ad Completed!';
                    watchBtn.textContent = '✓ Watched';
                    claimBtn.disabled = false;
                    claimBtn.textContent = '🎁 Claim Your Key Now!';
                    showMessage('challengeMessage', 'Ad completed! You can now claim your key.', 'success');
                }
            }, 1000);
        }

        async function claimReward() {
            const userId = currentUserId;
            const durationHours = selectedDuration;
            
            showMessage('challengeMessage', 'Generating your key...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/api/challenge/step5`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, durationHours })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('challengeCard').style.display = 'none';
                    document.getElementById('myKeyCard').innerHTML = `
                        <div class="card-title"><i>🎉</i> Your Free Key!</div>
                        <div class="key-result">
                            <div class="key-value">${data.key}</div>
                            <div style="margin-top: 12px;">
                                ⏰ Expires: ${data.expiryFormatted}<br>
                                📅 Duration: ${data.duration} hours
                            </div>
                            <button class="btn-success" style="margin-top: 16px;" onclick="copyKey('${data.key}')">📋 Copy Key</button>
                            <button onclick="location.reload()" style="margin-top: 10px;">🔄 Get Another Key</button>
                        </div>
                    `;
                    document.getElementById('myKeyCard').style.display = 'block';
                    showMessage('challengeMessage', data.message, 'success');
                } else {
                    showMessage('challengeMessage', data.error, 'error');
                }
            } catch (err) {
                showMessage('challengeMessage', 'Error: ' + err.message, 'error');
            }
        }

        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : (type === 'success' ? 'success' : 'info')}">${message}</div>`;
            setTimeout(() => {
                if (el.innerHTML.includes(message)) {
                    el.innerHTML = '';
                }
            }, 5000);
        }
