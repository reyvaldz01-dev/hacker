<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Free Key Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f, #0d1117);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: rgba(15, 25, 35, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            text-align: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .step {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .step.completed {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }

        .step-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .timer {
            font-size: 48px;
            font-weight: 800;
            font-family: monospace;
            color: #00e5ff;
            margin: 15px 0;
        }

        button {
            background: linear-gradient(135deg, #00e5ff, #0099cc);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #03030a;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        .key-result {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .key-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: #00ff88;
            word-break: break-all;
        }

        .alert {
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            font-size: 13px;
        }

        .alert-error {
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid #ff3355;
            color: #ff3355;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .alert-info {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">✦ NEXUS</div>
            <div class="subtitle" style="margin-bottom: 20px; opacity: 0.7;">Free Key Generator - 2 Step Challenge</div>

            <div class="input-group">
                <input type="text" id="userId" placeholder="Enter your ID (Telegram/Username)">
                <button onclick="startChallenge()" id="startBtn">🚀 Start Challenge</button>
            </div>

            <div id="stepsContainer" style="display: none;">
                <!-- Step 1 -->
                <div class="step" id="step1">
                    <div class="step-title">
                        <span>1</span> Wait 20 Seconds
                    </div>
                    <div class="timer" id="timer1">20s</div>
                    <button id="step1Btn" onclick="completeStep1()" disabled>⏳ Please wait...</button>
                </div>

                <!-- Step 2 -->
                <div class="step" id="step2">
                    <div class="step-title">
                        <span>2</span> Wait 100 Seconds
                    </div>
                    <div class="timer" id="timer2">100s</div>
                    <button id="step2Btn" onclick="completeStep2()" disabled>⏳ Please wait...</button>
                </div>
            </div>

            <div id="claimSection" style="display: none;">
                <div class="step" style="border-color: #00ff88;">
                    <div class="step-title">🎉 Ready to Claim!</div>
                    <button onclick="claimKey()" class="btn-success" id="claimBtn">🎁 Claim Your Key</button>
                </div>
            </div>

            <div id="myKeySection">
                <div id="myKeyContent"></div>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const BASE_API = "https://system-nexus-key.vercel.app";
        let currentUserId = null;
        let step1Interval = null;
        let step2Interval = null;

        async function loadMyKey() {
            const userId = localStorage.getItem('nexus_user');
            if (!userId) {
                document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info">🔐 Complete the challenge to get your free key!</div>';
                return;
            }
            
            try {
                const res = await fetch(`${BASE_API}/api/my-key/${userId}`);
                const data = await res.json();
                if (data.hasKey) {
                    document.getElementById('myKeyContent').innerHTML = `
                        <div class="key-result">
                            <div style="margin-bottom: 10px;">🎉 Your Active Key</div>
                            <div class="key-value">🔑 ${data.key}</div>
                            <div style="margin-top: 10px;">⏰ Expires in: ${data.remaining}</div>
                            <button onclick="copyKey('${data.key}')" style="margin-top: 10px; width: auto; padding: 8px 20px;">📋 Copy Key</button>
                        </div>
                    `;
                }
            } catch(e) { console.error(e); }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert('✅ Key copied!');
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => {
                if (msgDiv.innerHTML.includes(msg)) msgDiv.innerHTML = '';
            }, 5000);
        }

        async function startChallenge() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) {
                showMessage('Please enter your ID!', 'error');
                return;
            }
            
            currentUserId = userId;
            localStorage.setItem('nexus_user', userId);
            
            showMessage('Starting challenge...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('stepsContainer').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'none';
                    
                    if (data.step1_completed === 1 && data.step2_completed === 1) {
                        showClaimSection();
                    } else if (data.step1_completed === 1) {
                        startStep2();
                    } else {
                        startStep1();
                    }
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Network error: ' + err.message, 'error');
            }
        }

        function startStep1() {
            let timeLeft = 20;
            const timerEl = document.getElementById('timer1');
            const btnEl = document.getElementById('step1Btn');
            
            btnEl.disabled = true;
            btnEl.innerHTML = '⏳ Please wait...';
            
            if (step1Interval) clearInterval(step1Interval);
            
            step1Interval = setInterval(() => {
                timeLeft--;
                timerEl.innerHTML = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(step1Interval);
                    timerEl.innerHTML = '✅ Ready!';
                    btnEl.disabled = false;
                    btnEl.innerHTML = '✓ Complete Step 1';
                    btnEl.classList.add('btn-success');
                }
            }, 1000);
        }

        async function completeStep1() {
            if (!currentUserId) return;
            
            showMessage('Completing step 1...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('step1').classList.add('completed');
                    showMessage('Step 1 completed!', 'success');
                    startStep2();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        }

        function startStep2() {
            let timeLeft = 100;
            const timerEl = document.getElementById('timer2');
            const btnEl = document.getElementById('step2Btn');
            
            btnEl.disabled = true;
            btnEl.innerHTML = '⏳ Please wait...';
            
            if (step2Interval) clearInterval(step2Interval);
            
            step2Interval = setInterval(() => {
                timeLeft--;
                timerEl.innerHTML = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(step2Interval);
                    timerEl.innerHTML = '✅ Ready!';
                    btnEl.disabled = false;
                    btnEl.innerHTML = '✓ Complete Step 2';
                    btnEl.classList.add('btn-success');
                }
            }, 1000);
        }

        async function completeStep2() {
            if (!currentUserId) return;
            
            showMessage('Completing step 2...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('step2').classList.add('completed');
                    showMessage('Step 2 completed! You can now claim your key.', 'success');
                    showClaimSection();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        }

        function showClaimSection() {
            document.getElementById('claimSection').style.display = 'block';
        }

        async function claimKey() {
            showMessage('Generating your key...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/claim`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, durationHours: 3 })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('claimSection').innerHTML = `
                        <div class="step" style="border-color: #00ff88;">
                            <div class="step-title">🎉 Congratulations!</div>
                            <div class="key-value" style="font-size: 24px;">🔑 ${data.key}</div>
                            <div style="margin-top: 10px;">⏰ Expires: ${data.expiryFormatted}</div>
                            <button onclick="copyKey('${data.key}')" class="btn-success" style="margin-top: 15px;">📋 Copy Key</button>
                            <button onclick="location.reload()" style="margin-top: 10px; background: #555;">🔄 Get Another Key</button>
                        </div>
                    `;
                    loadMyKey();
                    showMessage('Key generated successfully!', 'success');
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        }

        loadMyKey();
    </script>
</body>
</html>
