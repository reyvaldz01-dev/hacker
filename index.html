<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS | Premium Key Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; min-height: 100vh; color: #fff; overflow-x: hidden; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle { position: absolute; background: linear-gradient(135deg, #00e5ff, #00ff88); border-radius: 50%; opacity: 0.1; animation: float linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.1; } 90% { opacity: 0.1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #00e5ff, #00ff88); border-radius: 10px; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease; }
        .logo { font-size: 56px; font-weight: 800; background: linear-gradient(135deg, #00e5ff, #00ff88, #00e5ff); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: gradientShift 3s ease infinite; }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .subtitle { color: rgba(255,255,255,0.5); margin-top: 8px; font-size: 14px; letter-spacing: 2px; }
        .glass-card { background: rgba(15, 25, 35, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 32px; padding: 32px; margin-bottom: 24px; transition: all 0.3s ease; animation: fadeInUp 0.6s ease; }
        .glass-card:hover { border-color: rgba(0, 229, 255, 0.5); box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); transform: translateY(-2px); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .card-title i { color: #00e5ff; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px 18px; background: rgba(10, 20, 30, 0.8); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 20px; color: white; font-size: 14px; transition: all 0.2s; }
        .input-group input:focus { outline: none; border-color: #00e5ff; box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1); }
        .btn { padding: 14px 28px; border: none; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, #00e5ff, #0099cc); color: white; width: 100%; justify-content: center; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0, 229, 255, 0.3); }
        .btn-success { background: linear-gradient(135deg, #00ff88, #00cc66); color: #03030a; }
        .btn-outline { background: transparent; border: 1px solid rgba(0, 229, 255, 0.4); color: #00e5ff; }
        .steps-container { display: flex; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 10px; }
        .step { flex: 1; text-align: center; padding: 16px 8px; background: rgba(10, 20, 30, 0.6); border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.2); position: relative; transition: all 0.3s; }
        .step.completed { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .step.active { border-color: #00e5ff; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); } }
        .step-number { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .step-label { font-size: 10px; color: rgba(255,255,255,0.5); }
        .step.completed .step-number { color: #00ff88; }
        .step.active .step-number { color: #00e5ff; }
        .duration-selector { display: flex; gap: 12px; margin: 20px 0; }
        .duration-option { flex: 1; padding: 16px; background: rgba(10, 20, 30, 0.8); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .duration-option:hover { border-color: #00e5ff; transform: translateY(-2px); }
        .duration-option.selected { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .duration-hours { font-size: 28px; font-weight: 800; }
        .duration-label { font-size: 11px; color: rgba(255,255,255,0.5); }
        .ad-timer { background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8)); border-radius: 24px; padding: 24px; text-align: center; margin: 20px 0; border: 1px solid rgba(0, 229, 255, 0.3); }
        .ad-icon { font-size: 48px; margin-bottom: 12px; }
        .ad-timer-number { font-size: 48px; font-weight: 800; font-family: monospace; color: #00e5ff; }
        .key-result { background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(0, 255, 136, 0.05)); border-radius: 24px; padding: 24px; text-align: center; border: 1px solid rgba(0, 229, 255, 0.3); }
        .key-value { font-family: 'Monaco', monospace; font-size: 20px; font-weight: 700; color: #00ff88; background: rgba(0, 0, 0, 0.5); padding: 16px; border-radius: 16px; word-break: break-all; letter-spacing: 1px; }
        .alert { padding: 14px 20px; border-radius: 20px; margin-top: 16px; font-size: 13px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .alert-success { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; }
        .alert-error { background: rgba(255, 51, 85, 0.1); border: 1px solid #ff3355; color: #ff3355; }
        .alert-info { background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff; color: #00e5ff; }
        .my-key-card { background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 229, 255, 0.05)); border-color: rgba(0, 255, 136, 0.3); }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #00e5ff; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-hint { background: rgba(0, 229, 255, 0.1); border: 1px dashed #00e5ff; border-radius: 16px; padding: 12px; margin: 15px 0; font-size: 12px; text-align: center; color: #00e5ff; }
        .progress-bar { margin-top: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; }
        @media (max-width: 600px) { .container { padding: 20px; } .glass-card { padding: 20px; } .step { padding: 10px 4px; } .step-number { font-size: 18px; } .step-label { font-size: 8px; } .duration-hours { font-size: 20px; } .key-value { font-size: 14px; } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <div class="logo">✦ NEXUS</div>
            <div class="subtitle">PREMIUM KEY GENERATOR • 5-STEP CHALLENGE</div>
        </div>

        <div class="glass-card" id="userCard">
            <div class="card-title"><i class="fas fa-user-astronaut"></i> Identity Verification</div>
            <div class="input-group">
                <label><i class="fab fa-telegram"></i> Telegram ID / Username</label>
                <input type="text" id="userId" placeholder="@username or 123456789">
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-phone"></i> Phone Number (Content as you wish)</label>
                <input type="tel" id="phone" placeholder="++1 376 xxxxxxx">
            </div>
            <button class="btn btn-primary" onclick="startChallenge()"><i class="fas fa-rocket"></i> Start 5-Step Challenge</button>
            <div id="userMsg"></div>
        </div>

        <div class="glass-card" id="challengeCard" style="display: none;">
            <div class="card-title"><i class="fas fa-tasks"></i> Challenge Progress</div>
            <div class="steps-container" id="stepsDisplay"></div>
            <div id="stepContent"></div>
            <div id="challengeMsg"></div>
        </div>

        <div class="glass-card my-key-card" id="myKeyCard">
            <div class="card-title"><i class="fas fa-key"></i> My Active Key</div>
            <div id="myKeyContent"><div style="text-align: center; padding: 20px;"><div class="spinner"></div> Loading...</div></div>
        </div>
    </div>

    <script>
        const BASE_API = 'https://system-nexus-key.vercel.app';
        const SAFELINKU_URL = "https://sfl.gl/rDcQ";
        const EXPECTED_PASSWORD = "NEXUS2025-7738-8793";

        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 10 + 5 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        let currentUserId = null;
        let currentStep = 1;
        let selectedDuration = 3;
        let timerInterval = null;
        let referralCheckInterval = null;

        async function loadMyKey() {
            const userId = localStorage.getItem('nexus_user');
            if (!userId) {
                document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info"><i class="fas fa-info-circle"></i> Complete the challenge to get your free key!</div>';
                return;
            }
            try {
                const res = await fetch(`${BASE_API}/api/my-key/${userId}`);
                const data = await res.json();
                if (data.hasKey) {
                    document.getElementById('myKeyContent').innerHTML = `
                        <div class="key-result">
                            <div style="margin-bottom: 12px; opacity: 0.7;">🎉 Your Active Key</div>
                            <div class="key-value"><i class="fas fa-key"></i> ${data.key}</div>
                            <div style="margin-top: 16px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                                <span class="alert-success" style="padding: 8px 16px;"><i class="fas fa-hourglass-half"></i> ${data.remaining}</span>
                                <span class="alert-info" style="padding: 8px 16px;"><i class="fas fa-clock"></i> ${data.duration} Hours</span>
                            </div>
                            <button class="btn btn-success" style="margin-top: 16px; width: auto;" onclick="copyKey('${data.key}')"><i class="fas fa-copy"></i> Copy Key</button>
                        </div>
                    `;
                } else {
                    document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info"><i class="fas fa-gift"></i> No active key. Start the challenge to get one!</div>';
                }
            } catch(e) { console.error(e); }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            showToast('Key copied to clipboard!', 'success');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? 'rgba(0,255,136,0.9)' : 'rgba(255,51,85,0.9)'};
                color: ${type === 'success' ? '#03030a' : 'white'};
                padding: 12px 24px;
                border-radius: 40px;
                font-size: 14px;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function startChallenge() {
            const userId = document.getElementById('userId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!userId || !email || !phone) {
                showToast('Please fill all fields', 'error');
                return;
            }
            if (!email.includes('@')) {
                showToast('Invalid email address', 'error');
                return;
            }
            
            currentUserId = userId;
            localStorage.setItem('nexus_user', userId);
            
            showToast('Starting challenge...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/challenge/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, email, phone })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('userCard').style.display = 'none';
                    document.getElementById('challengeCard').style.display = 'block';
                    currentStep = 1;
                    showStep1();
                    showToast('Challenge started! Complete all 5 steps.', 'success');
                } else {
                    showToast(data.error, 'error');
                }
            } catch (err) {
                showToast('Network error: ' + err.message, 'error');
            }
        }

        function updateStepsDisplay() {
            const stepsHtml = [1,2,3,4,5].map(step => `
                <div class="step ${step < currentStep ? 'completed' : (step === currentStep ? 'active' : '')}">
                    <div class="step-number">${step}</div>
                    <div class="step-label">${step === 1 ? 'Email' : step === 2 ? 'Subscribe' : step === 3 ? 'Password' : step === 4 ? 'Share' : 'Claim'}</div>
                </div>
            `).join('');
            document.getElementById('stepsDisplay').innerHTML = stepsHtml;
        }

        async function sendCode() {
            const email = document.getElementById('email').value;
            const res = await fetch(`${BASE_API}/api/challenge/send-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUserId, email })
            });
            const data = await res.json();
            if (data.code) {
                document.getElementById('verifyCode').value = data.code;
                showToast('Verification code sent!', 'success');
            }
        }

        async function showStep1() {
            updateStepsDisplay();
            document.getElementById('stepContent').innerHTML = `
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Verification Code</label>
                    <input type="text" id="verifyCode" placeholder="Enter 6-digit code" maxlength="6">
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-outline" onclick="sendCode()"><i class="fas fa-paper-plane"></i> Send Code</button>
                    <button class="btn btn-success" onclick="verifyStep1()"><i class="fas fa-check"></i> Verify</button>
                </div>
            `;
            await sendCode();
        }

        async function verifyStep1() {
            const code = document.getElementById('verifyCode').value;
            const res = await fetch(`${BASE_API}/api/challenge/step1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUserId, code })
            });
            const data = await res.json();
            if (data.success) {
                currentStep = 2;
                showStep2();
                showToast('Email verified!', 'success');
            } else {
                showToast(data.error, 'error');
            }
        }

        // ============================================================
        // STEP 2: TELEGRAM VERIFICATION
        // ============================================================

        function showStep2() {
            updateStepsDisplay();
            
            document.getElementById('stepContent').innerHTML = `
                <div class="ad-timer" style="background: linear-gradient(135deg, rgba(0,100,255,0.2), rgba(0,50,150,0.1));">
                    <div class="ad-icon"><i class="fab fa-telegram"></i></div>
                    <div style="font-size: 18px; font-weight: 700; margin: 10px 0; color: #0088cc;">Join Telegram Channel</div>
                    <div style="font-size: 13px; margin-bottom: 20px; opacity: 0.8;">
                        Click the button below to join our Telegram channel.<br>
                        After joining, enter your Telegram username to verify.
                    </div>
                    <a href="https://t.me/nexus_channel" target="_blank" class="btn btn-primary" style="display: inline-block; text-decoration: none; margin-bottom: 15px;">
                        <i class="fab fa-telegram"></i> Join Telegram Channel
                    </a>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Make sure you join the channel before verifying.<br>
                        Enter your Telegram username (without @) to verify.
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fab fa-telegram"></i> Telegram Username</label>
                    <input type="text" id="telegramUser" placeholder="username (without @)">
                </div>
                <button class="btn btn-success" onclick="verifyStep2()" style="width:100%;">
                    <i class="fas fa-check-circle"></i> Verify Subscription
                </button>
                <div id="telegramStatus" style="margin-top: 16px;"></div>
            `;
        }

        async function verifyStep2() {
            const telegramUsername = document.getElementById('telegramUser').value.trim();
            const statusDiv = document.getElementById('telegramStatus');
            
            if (!telegramUsername) {
                showToast('Please enter your Telegram username!', 'error');
                return;
            }
            
            const cleanUsername = telegramUsername.replace('@', '');
            statusDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> Verifying...</div>';
            
            try {
                const res = await fetch(`${BASE_API}/api/challenge/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, telegramUsername: cleanUsername })
                });
                const data = await res.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.message}</div>`;
                    currentStep = 3;
                    setTimeout(() => showStep3(), 1000);
                    showToast('Telegram verified!', 'success');
                } else {
                    let errorMsg = data.error;
                    if (data.channelLink) {
                        errorMsg += ` <a href="${data.channelLink}" target="_blank" style="color:#00e5ff;">Join Channel</a>`;
                    }
                    statusDiv.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${errorMsg}</div>`;
                    showToast(data.error, 'error');
                }
            } catch (err) {
                statusDiv.innerHTML = `<div class="alert alert-error">Network error: ${err.message}</div>`;
                showToast('Network error: ' + err.message, 'error');
            }
        }

        // ============================================================
        // STEP 3: SAFELINK PASSWORD
        // ============================================================
        
        function showStep3() {
            updateStepsDisplay();
            
            document.getElementById('stepContent').innerHTML = `
                <div class="ad-timer" style="background: linear-gradient(135deg, rgba(255,100,0,0.2), rgba(255,50,0,0.1));">
                    <div class="ad-icon"><i class="fas fa-lock"></i></div>
                    <div style="font-size: 18px; font-weight: 700; margin: 10px 0; color: #ffaa33;">Get Password from Safelink</div>
                    <div style="font-size: 13px; margin-bottom: 20px; opacity: 0.8;">
                        Click the button below, complete the safelink, and get the PASSWORD to continue.
                    </div>
                    <a href="${SAFELINKU_URL}" target="_blank" class="btn btn-primary" style="display: inline-block; text-decoration: none; margin-bottom: 15px;">
                        <i class="fas fa-external-link-alt"></i> Go to Safelink
                    </a>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> After completing the safelink, you will get a password.<br>
                        Enter the password below to proceed to the next step.
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-key"></i> Enter Password from Safelink</label>
                    <input type="text" id="safelinkPassword" placeholder="Enter password...">
                </div>
                <button class="btn btn-success" onclick="verifyStep3()" style="width:100%;">
                    <i class="fas fa-check-circle"></i> Verify Password
                </button>
            `;
        }

        async function verifyStep3() {
            const enteredPassword = document.getElementById('safelinkPassword').value.trim();
            
            if (!enteredPassword) {
                showToast('Please enter the password from Safelink!', 'error');
                return;
            }
            
            showToast('Verifying password...', 'info');
            
            if (enteredPassword === EXPECTED_PASSWORD) {
                const res = await fetch(`${BASE_API}/api/challenge/step3`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, captchaAnswer: 19 })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 4;
                    showStep4();
                    showToast('Password verified! Proceed to step 4.', 'success');
                } else {
                    showToast(data.error, 'error');
                }
            } else {
                showToast('Wrong password! Please check the Safelink again.', 'error');
            }
        }

        // ============================================================
        // STEP 4: REFERRAL SYSTEM
        // ============================================================

        let referralStatusCheckRunning = false;

        function showStep4() {
            updateStepsDisplay();
            
            const shareLink = `${window.location.origin}/ref/${currentUserId}`;
            
            document.getElementById('stepContent').innerHTML = `
                <div class="ad-timer">
                    <div class="ad-icon"><i class="fas fa-share-alt"></i></div>
                    <div style="font-size: 18px; font-weight: 700; margin-bottom: 10px;">Share Link to 3 Friends!</div>
                    <div style="font-size: 13px; margin-bottom: 20px; opacity: 0.8;">
                        Every friend who clicks your link will be counted automatically.<br>
                        <strong>Need 3 clicks from different IP addresses</strong> to continue.
                    </div>
                    <div class="key-value" style="font-size: 14px; word-break: break-all; margin-bottom: 15px;">
                        ${shareLink}
                    </div>
                    <button class="btn btn-outline" onclick="copyReferralLink('${shareLink}')" style="margin-bottom: 15px;">
                        <i class="fas fa-copy"></i> Copy Link
                    </button>
                    <div id="referralStatus" style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 16px;">
                        <div><i class="fas fa-spinner fa-spin"></i> Checking status...</div>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button id="checkReferralBtn" class="btn btn-success" onclick="checkReferralStatus()" style="flex: 1;">
                        <i class="fas fa-sync-alt"></i> Check Status
                    </button>
                    <button id="manualVerifyBtn" class="btn btn-primary" onclick="manualVerifyStep4()" style="flex: 1; display: none;">
                        <i class="fas fa-arrow-right"></i> Continue to Step 5
                    </button>
                </div>
            `;
            
            if (referralCheckInterval) clearInterval(referralCheckInterval);
            referralCheckInterval = setInterval(() => {
                if (!referralStatusCheckRunning) {
                    checkReferralStatus();
                }
            }, 10000);
            setTimeout(() => checkReferralStatus(), 500);
        }

        function copyReferralLink(link) {
            navigator.clipboard.writeText(link);
            showToast('Link copied! Share with your friends.', 'success');
        }

        async function checkReferralStatus() {
            if (referralStatusCheckRunning) return;
            referralStatusCheckRunning = true;
            
            try {
                const res = await fetch(`${BASE_API}/api/referral-status/${currentUserId}`);
                const data = await res.json();
                
                if (data.success) {
                    const statusDiv = document.getElementById('referralStatus');
                    const checkBtn = document.getElementById('checkReferralBtn');
                    const manualBtn = document.getElementById('manualVerifyBtn');
                    const current = data.referralCount;
                    const required = data.requiredCount;
                    const remaining = data.remaining;
                    const percentage = (current / required) * 100;
                    
                    if (data.isCompleted) {
                        statusDiv.innerHTML = `
                            <div style="color: #00ff88;">
                                <i class="fas fa-check-circle"></i> ✅ Referral completed! (${current}/${required} clicks)
                            </div>
                        `;
                        if (checkBtn) checkBtn.style.display = 'none';
                        if (manualBtn) {
                            manualBtn.style.display = 'block';
                            manualBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Continue to Step 5';
                            manualBtn.disabled = false;
                        }
                        if (referralCheckInterval) clearInterval(referralCheckInterval);
                    } else {
                        statusDiv.innerHTML = `
                            <div><i class="fas fa-users"></i> Progress: ${current}/${required} unique clicks</div>
                            <div class="progress-bar">
                                <div style="width: ${percentage}%; background: linear-gradient(90deg, #00e5ff, #00ff88); border-radius: 10px; height: 8px;"></div>
                            </div>
                            <div style="margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.5);">
                                ${remaining > 0 ? `Need ${remaining} more click${remaining > 1 ? 's' : ''} from different IP addresses` : 'Click "Check Status" to refresh'}
                            </div>
                        `;
                        if (manualBtn) manualBtn.style.display = 'none';
                        if (checkBtn) checkBtn.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error('Check referral error:', err);
            } finally {
                referralStatusCheckRunning = false;
            }
        }

        async function manualVerifyStep4() {
            showToast('Verifying referral...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/challenge/step4`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentStep = 5;
                    showStep5();
                    showToast('Referral verified! Proceed to step 5.', 'success');
                    if (referralCheckInterval) clearInterval(referralCheckInterval);
                } else {
                    showToast(data.error, 'error');
                    checkReferralStatus();
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        // ============================================================
        // STEP 5: WATCH AD & CLAIM KEY (FIXED)
        // ============================================================

        function showStep5() {
            updateStepsDisplay();
            
            document.getElementById('stepContent').innerHTML = `
                <div class="duration-selector" id="durationSelector">
                    <div class="duration-option" onclick="selectDuration(3)">
                        <div class="duration-hours">3</div>
                        <div class="duration-label">Hours</div>
                    </div>
                    <div class="duration-option" onclick="selectDuration(6)">
                        <div class="duration-hours">6</div>
                        <div class="duration-label">Hours</div>
                    </div>
                    <div class="duration-option selected" onclick="selectDuration(12)">
                        <div class="duration-hours">12</div>
                        <div class="duration-label">Hours</div>
                    </div>
                </div>
                <div class="ad-timer" id="adTimer">
                    <div class="ad-icon"><i class="fas fa-video"></i></div>
                    <div class="ad-timer-number" id="timerDisplay">30s</div>
                    <div style="font-size: 12px; opacity: 0.7;">Watch 30-second ad to claim your key</div>
                </div>
                <button id="watchAdBtn" class="btn btn-primary" onclick="startWatchAd()" style="width:100%;">
                    <i class="fas fa-play"></i> Watch Ad
                </button>
                <button id="claimKeyBtn" class="btn btn-success" onclick="claimKeyReward()" disabled style="width:100%; margin-top:12px;">
                    <i class="fas fa-gift"></i> Claim Your Key
                </button>
                <div id="adMessage" style="margin-top: 16px;"></div>
            `;
            
            selectedDuration = 12;
            
            // Reset ad state
            if (timerInterval) clearInterval(timerInterval);
            const claimBtn = document.getElementById('claimKeyBtn');
            if (claimBtn) claimBtn.disabled = true;
        }

        function selectDuration(hours) {
            selectedDuration = hours;
            document.querySelectorAll('.duration-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function startWatchAd() {
            let timeLeft = 30;
            const timerDisplay = document.getElementById('timerDisplay');
            const watchBtn = document.getElementById('watchAdBtn');
            const claimBtn = document.getElementById('claimKeyBtn');
            const adMessage = document.getElementById('adMessage');
            
            if (timerInterval) clearInterval(timerInterval);
            
            watchBtn.disabled = true;
            watchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Watching ad...';
            adMessage.innerHTML = '<div class="alert alert-info"><i class="fas fa-hourglass-half"></i> Please wait, ad in progress...</div>';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerHTML = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.innerHTML = '✅ Done!';
                    watchBtn.innerHTML = '<i class="fas fa-check"></i> Ad Completed';
                    watchBtn.disabled = false;
                    claimBtn.disabled = false;
                    claimBtn.style.opacity = '1';
                    adMessage.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Ad completed! You can now claim your key.</div>';
                    showToast('Ad completed! You can now claim your key.', 'success');
                }
            }, 1000);
        }

        async function claimKeyReward() {
            const claimBtn = document.getElementById('claimKeyBtn');
            claimBtn.disabled = true;
            claimBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            
            showToast('Generating your key...', 'info');
            
            try {
                const res = await fetch(`${BASE_API}/api/challenge/step5`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, durationHours: selectedDuration })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('challengeCard').innerHTML = `
                        <div class="card-title"><i class="fas fa-trophy"></i> Congratulations!</div>
                        <div class="key-result">
                            <div class="key-value"><i class="fas fa-key"></i> ${data.key}</div>
                            <div style="margin-top: 16px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                                <span class="alert-success"><i class="fas fa-hourglass-half"></i> ${data.duration} Hours</span>
                                <span class="alert-info"><i class="fas fa-calendar"></i> Expires: ${data.expiryFormatted}</span>
                                <span class="alert-info"><i class="fas fa-lock"></i> Locked to IP: ${data.lockedIp}</span>
                            </div>
                            <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
                                <button class="btn btn-success" onclick="copyKey('${data.key}')"><i class="fas fa-copy"></i> Copy Key</button>
                                <button class="btn btn-outline" onclick="location.reload()"><i class="fas fa-redo"></i> Get Another Key</button>
                            </div>
                        </div>
                    `;
                    loadMyKey();
                    showToast('Key generated successfully!', 'success');
                } else {
                    showToast(data.error, 'error');
                    claimBtn.disabled = false;
                    claimBtn.innerHTML = '<i class="fas fa-gift"></i> Claim Your Key';
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
                claimBtn.disabled = false;
                claimBtn.innerHTML = '<i class="fas fa-gift"></i> Claim Your Key';
            }
        }

        // Initialize
        loadMyKey();
    </script>
</body>
</html>
